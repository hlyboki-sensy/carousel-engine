<!DOCTYPE html>
<html lang="uk">
<head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-TTQQ13ZJET"></script>
<script src="js/ga.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Карусель · Hlyboki Sensy</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1512">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Карусель">
<style>
  /* Comforter Brush — заголовковий скрипт стилю «Оксамит». Локальні woff2 (офлайн),
     оголошені в ГОЛОВНОМУ документі → доступні і в shadow-прев'ю слайда, і в snapdom-PNG. */
  @font-face{font-family:'Comforter Brush';font-style:normal;font-weight:400;font-display:swap;
    src:url('fonts/comforter-cyr.woff2') format('woff2');
    unicode-range:U+0301,U+0400-045F,U+0490-0491,U+04B0-04B1,U+2116;}
  @font-face{font-family:'Comforter Brush';font-style:normal;font-weight:400;font-display:swap;
    src:url('fonts/comforter-lat.woff2') format('woff2');
    unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD;}
  :root{
    --bg:#ffffff; --card:#f6f3ee; --line:#e9e4da; --ink:#241c15; --muted:#8f8474;
    --accent:#FFD20E; --field:#ffffff; --dark:#1a1512;
    --serif:"Didot","Playfair Display","Bodoni 72",Georgia,serif;
    --sans:-apple-system,"Helvetica Neue",Arial,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);overscroll-behavior:none;font-size:15px}
  /* grid замість flex — рядок шапки колапсуємо плавно. КЛЮЧОВЕ: перший рядок має ЯВНУ висоту
     (--hdr-h, не auto) — grid-template-rows з auto НЕ інтерполюється, тому auto→0 стрибав.
     Крива cubic-bezier(.32,.72,0,1) — iOS drawer curve (з Ionic), м'який природний collapse. */
  .app{display:grid;grid-template-rows:var(--hdr-h,68px) 1fr auto;height:100dvh;max-width:520px;margin:0 auto;background:var(--bg);transition:grid-template-rows .34s cubic-bezier(.32,.72,0,1)}
  .app.hdr-collapsed{grid-template-rows:0 1fr auto}

  /* при гортанні вниз шапка ховається (рядок grid плавно стискається), при гортанні вгору — вертається */
  header{display:flex;align-items:center;gap:11px;padding:14px 18px 12px;border-bottom:1px solid var(--line);overflow:hidden;position:relative;z-index:20;transition:opacity .28s cubic-bezier(.32,.72,0,1)}
  .app.hdr-collapsed>header{opacity:0}
  .mark{width:40px;height:40px;border-radius:50%;background:var(--dark);flex:none;display:grid;place-items:center;overflow:hidden;text-decoration:none;cursor:pointer}
  .lg{font-family:var(--serif);font-weight:700;color:#fff;line-height:1;white-space:nowrap;letter-spacing:-.02em;font-size:20px}
  .lg .s{color:var(--accent);margin-left:-.16em} /* зрощена монограма HS */
  .brand{line-height:1.15}
  .brand .n{font-family:var(--serif);font-weight:700;font-size:18px;letter-spacing:.01em}
  .brand .k{font-size:11px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-top:1px}
  .hdr-act{margin-left:auto;display:flex;gap:8px}
  .icobtn{width:38px;height:38px;border:1px solid var(--line);background:var(--field);display:grid;place-items:center;font-size:16px;color:var(--ink)}
  .icobtn:disabled{opacity:.32}
  #undoBtn{font-size:19px}

  .body{flex:1;overflow-y:auto;padding:14px 14px 22px;-webkit-overflow-scrolling:touch}
  .screen{display:none}
  .screen.on{display:block}
  .sectlabel{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin:4px 2px 12px}
  .sectlabel::before{content:"";width:14px;height:2px;background:var(--accent);flex:none}
  /* згортабельний заголовок секції (Написи бренду) — зі стрілкою, як слайди */
  .collhead{display:flex;align-items:center;gap:9px;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin:4px 2px 12px;cursor:pointer;user-select:none}
  .collhead .chev{font-size:13px;width:13px;text-align:center;color:var(--ink);line-height:1}
  /* стрілка у «Розкидати текст» повертається при розгортанні */
  .split>summary .chev{display:inline-block;font-size:13px;color:var(--ink);margin-right:7px;transition:transform .16s ease}
  .split[open]>summary .chev{transform:rotate(90deg)}
  /* акордеон-панелі у «Стилі» — виразні, клікабельні (як картки слайдів) */
  .acchead{display:flex;align-items:center;gap:11px;padding:14px 13px;border:1px solid var(--line);
    background:var(--card);cursor:pointer;user-select:none;margin-bottom:11px}
  .acchead.open{border-color:var(--ink);margin-bottom:0}
  .acchead .chev{color:var(--ink);font-size:16px;width:16px;text-align:center;flex:none;line-height:1}
  .acchead .acctitle{font-family:var(--serif);font-style:italic;font-weight:700;font-size:16px;color:var(--ink)}
  .acchead.open+.stylelist,.acchead.open+.group{border:1px solid var(--ink);border-top:0;padding-top:14px}

  /* картка слайда */
  .slide{border:1px solid var(--line);background:var(--card);margin-bottom:11px}
  .shead{display:flex;align-items:center;gap:11px;padding:13px 13px;cursor:pointer}
  .snum{width:27px;height:27px;background:var(--dark);color:#fff;flex:none;display:grid;place-items:center;font-size:13px;font-weight:700}
  .stitle{flex:1;min-width:0}
  .stitle .t{display:block;font-family:var(--serif);font-style:italic;font-weight:700;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .stitle .s{display:block;font-size:12px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sacts{display:flex;gap:4px;flex:none}
  .sbtn{width:32px;height:32px;border:1px solid var(--line);background:var(--field);display:grid;place-items:center;font-size:14px;color:var(--muted)}
  .chev{color:var(--ink);font-size:19px;width:18px;text-align:center;flex:none;line-height:1}
  .sbody{border-top:1px solid var(--line);padding:15px 13px 16px;display:flex;flex-direction:column;gap:16px}
  .thumbrow{display:flex;flex-direction:column;gap:8px}
  /* прев'ю прилипає зверху при гортанні до контролів — щоб зміну було видно, поки коригуєш */
  /* прев'ю прилипає зверху. will-change+translateZ виносять його на окремий GPU-шар →
     sticky не «дергається» при гортанні на iOS (перемальовується композитором, не CPU) */
  .thumb{width:100%;border:1px solid var(--line);position:sticky;top:6px;z-index:4;overflow:hidden;background:#241a12;box-shadow:0 6px 18px rgba(20,14,10,.12);will-change:transform;transform:translateZ(0);-webkit-transform:translateZ(0)}
  .thumb .mnt{position:absolute;top:0;left:0;transform-origin:top left}
  .thumbclose{position:absolute;top:8px;right:8px;z-index:6;width:34px;height:34px;border:none;border-radius:50%;background:rgba(20,16,12,.6);color:#fff;font-size:15px;display:grid;place-items:center;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
  .showpv{width:100%;padding:12px;border:1px dashed var(--line);background:var(--field);color:var(--muted);font:inherit;font-size:13px;text-align:left}
  .thumbhint{font-size:12px;color:var(--muted);line-height:1.5}

  .field{display:flex;flex-direction:column;gap:6px}
  .field>label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  input[type=text],textarea{width:100%;background:var(--field);border:1px solid var(--line);padding:11px 12px;font:inherit;font-size:15px;color:var(--ink);resize:none}
  textarea{min-height:64px;line-height:1.4}
  input:focus,textarea:focus{outline:none;border-color:var(--accent)}

  .seg{display:flex;border:1px solid var(--line);background:var(--field);overflow:hidden}
  .seg button{flex:1;padding:10px 4px;border:0;background:transparent;font:inherit;font-size:13px;color:var(--muted);border-right:1px solid var(--line)}
  .seg button:last-child{border-right:0}
  .seg button.on{background:var(--dark);color:#fff}
  .seg.mini button{font-size:16px;padding:9px 4px}

  /* AI-розкидання */
  .split{border:1px solid var(--line);background:var(--card);margin-bottom:12px}
  .split>summary{padding:13px;font-weight:600;cursor:pointer;list-style:none;font-size:14px}
  .split>summary::-webkit-details-marker{display:none}
  .splitbody{padding:0 13px 14px;display:flex;flex-direction:column;gap:10px}
  .splitbody #bigtext{min-height:96px}
  .splitrow{display:flex;gap:9px}
  .splitrow #splitcount{flex:1}
  .splitrow #splitgo{flex:none;min-width:120px}
  .keywiz{border-top:1px solid var(--line);padding-top:11px;margin-top:2px}
  .keywiz>summary{font-size:12px;color:var(--muted);cursor:pointer;margin-bottom:9px;list-style:none}
  .keywiz>summary::-webkit-details-marker{display:none}
  .keywiz input{margin-bottom:7px}
  .keystate{font-size:12px;color:var(--muted);margin-bottom:9px}
  .keystate.ok{color:#1a7f3c;font-weight:600}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{padding:8px 11px;border:1px solid var(--line);background:var(--field);font:inherit;font-size:13px;color:var(--ink)}
  .chip.on{border-color:var(--accent);background:rgba(255,210,14,.12);color:var(--ink)}
  .slider{display:flex;align-items:center;gap:11px}
  /* ширина підпису гнучка (56–96px): довгі («Інтенсивність», «Затемнення тла») переносяться
     на 2 рядки всередині своєї колонки й НЕ підлазять під повзунок */
  .slider label{font-size:13px;color:var(--muted);flex:none;min-width:56px;max-width:96px;line-height:1.25}
  input[type=range]{flex:1;accent-color:var(--accent);height:24px}
  .slider .val{font-size:12px;color:var(--muted);width:40px;text-align:right;flex:none;font-variant-numeric:tabular-nums}

  .btnrow{display:flex;gap:9px;flex-wrap:wrap}
  .obtn{flex:1;min-width:120px;padding:12px;border:1px solid var(--line);background:var(--field);font:inherit;font-size:14px;color:var(--ink);display:flex;align-items:center;justify-content:center;gap:7px}
  .obtn.ghost{border-style:dashed}
  .obtn b{color:var(--accent);font-size:17px;line-height:1}
  .addrow{display:flex;gap:9px;margin-top:2px}

  /* СТИЛЬ */
  .group{border:1px solid var(--line);background:var(--card);padding:15px 14px;margin-bottom:12px;display:flex;flex-direction:column;gap:15px}
  .swatches{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .sw{width:38px;height:38px;border-radius:50%;border:2px solid transparent;position:relative;cursor:pointer}
  .sw.on{border-color:var(--ink)}
  .sw.on::after{content:"✓";position:absolute;inset:0;display:grid;place-items:center;color:#fff;font-size:14px;mix-blend-mode:difference}
  .sw.custom{overflow:hidden}.sw.custom input{position:absolute;inset:-6px;opacity:0;cursor:pointer}
  /* жива мініатюра слайда у розділі «Стиль» */
  .stylepv{display:flex;justify-content:center}
  .stylepv .mnt-box{width:158px;position:relative;overflow:hidden;border:1px solid var(--line);background:#241a12}
  .stylepv .mnt-box .mnt{position:absolute;top:0;left:0;transform-origin:top left}
  /* стиль-пресети (комбо: шрифт + кольори) */
  .stylelist{display:flex;flex-direction:column;gap:9px;margin-bottom:6px}
  .styleitem{display:flex;align-items:center;gap:13px;padding:10px 12px;border:1px solid var(--line);background:var(--field)}
  .styleitem.on{border-color:var(--accent);border-width:2px;padding:9px 11px}
  .styleitem .aa{width:54px;height:54px;flex:none;display:grid;place-items:center;font-size:27px;line-height:1;overflow:hidden}
  .styleitem .aa i{font-style:italic}
  .styleitem .meta{flex:1;min-width:0}
  .styleitem .meta .nm{font-family:var(--serif);font-style:italic;font-weight:700;font-size:17px}
  .styleitem .sws{display:flex;gap:5px;margin-top:6px}
  .styleitem .sws i{width:15px;height:15px;border-radius:50%;border:1px solid rgba(0,0,0,.08)}
  /* сітка ручних кольорів */
  .colorgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .colorcell{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center}
  /* усі кольорові пікери — круглі кружечки без обводки (палітра стилю + «Колір тла» слайда/обкладинки) */
  input[type=color]{width:52px;height:52px;border:none;border-radius:50%;background:none;padding:0;cursor:pointer;-webkit-appearance:none;appearance:none}
  input[type=color]::-webkit-color-swatch-wrapper{padding:0}
  input[type=color]::-webkit-color-swatch{border:none;border-radius:50%}
  input[type=color]::-moz-color-swatch{border:none;border-radius:50%}
  .colorcell .cl{font-size:10.5px;color:var(--muted);line-height:1.2}
  .presetrow{display:flex;gap:9px;overflow-x:auto;padding-bottom:2px}
  .preset{flex:none;width:112px;border:1px solid var(--line);background:var(--field);padding:0;overflow:hidden;text-align:left;cursor:pointer}
  .preset .pv{height:74px;display:flex;align-items:flex-end;padding:9px;font-family:var(--serif);font-style:italic;font-size:15px;line-height:1}
  .preset .pl{padding:8px 10px;font-size:12px;color:var(--muted)}
  .preset.on{border-color:var(--accent);border-width:2px}

  /* ПРЕВʼЮ */
  .pvhint{font-size:12.5px;color:var(--muted);line-height:1.5;margin:2px 2px 14px}
  .pvhint b{color:var(--ink);font-weight:600}
  .swipe{display:flex;gap:14px;overflow-x:auto;scroll-snap-type:x mandatory;padding:0 6px 8px;-webkit-overflow-scrolling:touch}
  .pcard{flex:none;width:82%;scroll-snap-align:center;border:1px solid var(--line);position:relative;overflow:hidden;background:#241a12}
  .pcard .mnt{position:absolute;top:0;left:0;transform-origin:top left}
  .pcard .plabel{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.55);color:#fff;font-size:10px;padding:3px 7px;letter-spacing:.06em;z-index:6}
  /* напрямні притягування (центр по X/Y) — з'являються при перетягуванні/повороті тексту; позиція задається інлайн */
  .guide-v,.guide-h{position:absolute;background:var(--accent);opacity:0;z-index:8;pointer-events:none;box-shadow:0 0 6px rgba(255,210,14,.6)}
  .guide-v{top:0;bottom:0;width:1.5px;transform:translateX(-50%)}
  .guide-h{left:0;right:0;height:1.5px;transform:translateY(-50%)}
  .guide-v.on,.guide-h.on{opacity:.92}
  .dots{display:flex;gap:7px;justify-content:center;margin-top:14px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--line)}
  .dot.on{background:var(--accent);width:20px;border-radius:4px}
  .empty{color:var(--muted);font-size:14px;text-align:center;padding:40px 20px;line-height:1.6}
  /* кнопка «на весь екран» у кутку слайда прев'ю */
  .fsbtn{position:absolute;top:8px;right:8px;width:36px;height:36px;background:rgba(20,16,12,.55);color:#fff;border:none;font-size:17px;z-index:7;display:grid;place-items:center;-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px)}
  /* ── повноекранне прев'ю (тап по слайду) ── */
  .fsprev{position:fixed;inset:0;width:100vw;height:100vh;height:100dvh;z-index:95;background:#14100c;display:flex;flex-direction:column;animation:fadeIn .2s ease}
  .fstop{display:flex;align-items:center;justify-content:space-between;padding:calc(10px + env(safe-area-inset-top)) 16px 10px;color:#f4efe7}
  .fsn{font-size:13px;letter-spacing:.12em;color:rgba(244,239,231,.72)}
  .fsclose{width:40px;height:40px;border:1px solid rgba(244,239,231,.3);background:none;color:#f4efe7;font-size:17px}
  /* align-items:center — вертикальне центрування слайда; горизонтальне робить явний margin-left у mountInto
     (justify-content лишаємо flex-start, щоб не було подвійного центрування) */
  .fsstage{flex:1;display:flex;flex-direction:column;align-items:stretch;justify-content:center;padding:0 12px;overflow:hidden}
  .fsmnt{width:100%;position:relative}
  .fsmnt .mnt{position:absolute;top:0;left:0;transform-origin:top left}
  .fsbar{display:flex;align-items:center;gap:12px;padding:12px 16px calc(14px + env(safe-area-inset-bottom))}
  .fsnavbtn{width:46px;height:46px;border:1px solid rgba(244,239,231,.3);background:none;color:#f4efe7;font-size:22px;flex:none}
  .fsnavbtn:disabled{opacity:.3}
  .fshint{flex:1;text-align:center;font-size:11.5px;color:rgba(244,239,231,.62);line-height:1.45}

  .foot{flex:none;border-top:1px solid var(--line);background:var(--bg)}
  .exportbar{padding:11px 14px 9px}
  .export{width:100%;padding:15px;border:0;background:var(--dark);color:#fff;font:inherit;font-size:16px;font-weight:600;letter-spacing:.01em;display:flex;align-items:center;justify-content:center;gap:9px}
  .export .cnt{color:var(--accent);font-weight:700}
  .export:disabled{opacity:.55}
  .tabs{display:flex;padding:2px 8px 8px}
  .tab{flex:1;padding:8px 4px 6px;background:transparent;border:0;font:inherit;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted)}
  .tab .ic{font-size:19px;line-height:1}
  .tab .lb{font-size:11px;letter-spacing:.02em}
  .tab.on{color:var(--ink)}.tab.on .lb{font-weight:600}
  .tab.on .ic{position:relative}
  .tab.on .ic::after{content:"";position:absolute;left:50%;bottom:-4px;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--accent)}

  /* панель «Проєкти й чернетки» */
  .overlay{position:fixed;inset:0;background:rgba(20,16,12,.5);z-index:90;display:flex;align-items:flex-end}
  .sheet{background:var(--bg);width:100%;max-width:520px;margin:0 auto;max-height:86dvh;display:flex;flex-direction:column;border-radius:16px 16px 0 0;overflow:hidden}
  .sheethead{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line);flex:none}
  .sheethead b{font-family:var(--serif);font-style:italic;font-weight:700;font-size:19px}
  .sheethead .x{border:0;background:none;font-size:20px;color:var(--muted);cursor:pointer;padding:4px}
  .draftlist{overflow-y:auto;padding:12px 14px;flex:1;-webkit-overflow-scrolling:touch}
  .draftitem{display:flex;align-items:center;gap:8px;padding:13px 12px;border:1px solid var(--line);background:var(--card);margin-bottom:9px}
  .draftitem.on{border-color:var(--accent);border-width:2px;padding:12px 11px}
  .draftitem .dinfo{flex:1;min-width:0;cursor:pointer}
  .draftitem .dn{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .draftitem .dd{font-size:12px;color:var(--muted);margin-top:2px}
  .sheetacts{padding:12px 14px 18px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:9px;flex:none}
  .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(10px);background:var(--dark);color:#fff;font-size:13px;padding:10px 16px;border-radius:2px;opacity:0;transition:.2s;z-index:80;pointer-events:none;max-width:90%}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ── делікатний motion (стриманий, вимикається за prefers-reduced-motion) ── */
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @keyframes accIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:no-preference){
    .overlay{animation:fadeIn .18s ease}
    .sheet{animation:sheetUp .3s cubic-bezier(.2,.85,.25,1)}
    .screen.on{animation:fadeIn .22s ease}
    .stylelist,.acchead+.group,.sbody{animation:accIn .22s ease}
    .draftitem{animation:accIn .2s ease}
    /* тактильний відгук на дотик */
    .obtn:active,.export:active,.sbtn:active,.tab:active,.styleitem:active,.chip:active,
    .seg button:active,.preset:active,.add:active,.acchead:active,.draftitem .dinfo:active,.icobtn:active{
      transform:scale(.97)}
    .obtn,.export,.sbtn,.tab,.styleitem,.chip,.seg button,.preset,.add,.acchead,.icobtn,.sw,.dot{
      transition:transform .09s ease,border-color .16s ease,background .16s ease,color .16s ease}
    .tab .ic{transition:transform .16s ease}
    .tab.on .ic{transform:translateY(-1px)}
    .chev,.acchead .chev{transition:transform .16s ease}
  }
</style>
