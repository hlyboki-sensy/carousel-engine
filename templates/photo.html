<!DOCTYPE html>
<!-- ФОТО-слайд · розмір за форматом · фон-фото (або колір) + градієнт + теза/текст -->
<html lang="uk">
<head>
<meta charset="UTF-8">
{{FONT_LINKS}}
<style>
  :root{
    --font-display: {{FONT_DISPLAY}};
    --font-body: {{FONT_BODY}};
    --disp-weight: {{DISP_WEIGHT}}; --disp-style: {{DISP_STYLE}};
    --body-weight: {{BODY_WEIGHT}}; --body-style: {{BODY_STYLE}};
    --accent: {{ACCENT}};
    --ac-font: {{ACCENT_FONT}}; --ac-color: {{ACCENT_COLOR}};
    --ac-weight: {{ACCENT_WEIGHT}}; --ac-style: {{ACCENT_STYLE}};
    --card-bg: {{CARD_BG}};
    --ink: {{TEXT_ON_DARK}};
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:{{W}}px; height:{{H}}px; }
  .card{ position:relative; width:{{W}}px; height:{{H}}px; overflow:hidden;
    background:var(--card-bg); font-family:var(--font-display); }
  .photo{ position:absolute; top:50%; left:50%; width:116%; height:116%; object-fit:cover; object-position:center;
    transform:translate(-50%,-50%) translate({{POS_X}}px,{{POS_Y}}px) scale({{SCALE}}) rotate({{ROTATE}}deg); transform-origin:center;
    display:{{PHOTO_DISPLAY}}; filter:saturate(0.98); z-index:0; }
  .grad{ position:absolute; inset:0; z-index:1; pointer-events:none; display:{{GRAD_DISPLAY}}; background:
      linear-gradient(180deg, rgba(10,14,20,0.32) 0%, rgba(10,14,20,0.05) 22%,
      rgba(10,14,20,0.18) 44%, rgba(8,12,18,0.62) 66%, rgba(6,10,16,0.88) 100%); }
  .wrap{ position:absolute; left:90px; right:90px; bottom:330px; text-align:{{TEXT_ALIGN}}; color:var(--ink); z-index:3;
    transform:translate({{TEXT_X}}px,{{TEXT_Y}}px);
    background:{{PLATE_BG}}; -webkit-backdrop-filter:{{PLATE_BLUR}}; backdrop-filter:{{PLATE_BLUR}}; padding:{{PLATE_PAD}}; }
  .lead{ font-weight:var(--disp-weight); font-style:var(--disp-style); font-size:104px; line-height:1; letter-spacing:0.01em;
    text-shadow:0 3px 44px rgba(0,0,0,0.5); }
  .rule{ width:64px; height:3px; background:var(--accent); margin:34px 0 30px; display:{{RULE_DISPLAY}}; }
  .body{ font-family:var(--font-body); font-weight:var(--body-weight); font-style:var(--body-style); font-size:48px; line-height:1.34;
    letter-spacing:0.005em; text-shadow:0 2px 26px rgba(0,0,0,0.55); }
  .handle{ position:absolute; bottom:62px; left:0; right:0; text-align:center; z-index:3;
    font-family:var(--font-body); font-weight:400; font-size:23px;
    letter-spacing:0.34em; text-transform:lowercase; color:rgba(244,239,231,0.82);
    text-shadow:0 1px 18px rgba(0,0,0,0.6); display:{{HANDLE_DISPLAY}}; }
  .texture{ position:absolute; inset:0; z-index:2; pointer-events:none; display:{{TEXTURE_DISPLAY}};
    background:{{TEXTURE}}; background-size:{{TEXTURE_SIZE}}; background-repeat:repeat;
    mix-blend-mode:{{TEXTURE_BLEND}}; opacity:{{TEXTURE_OP}}; }
  .dim{ position:absolute; inset:0; z-index:2; pointer-events:none; display:{{DIM_DISPLAY}}; background:#000; opacity:{{DIM}}; }
  .ac{ font-family:{{ACCENT_FONT}}; color:{{ACCENT_COLOR}};
    font-weight:{{ACCENT_WEIGHT}}; font-style:{{ACCENT_STYLE}}; }
  /* вирізаний об'єкт — верхній шар, над текстом */
  .cutout{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
    object-position:{{CUT_X}}% {{CUT_Y}}%; transform:scale({{CUT_SCALE}}) rotate({{CUT_ROTATE}}deg); transform-origin:center;
    display:{{CUTOUT_DISPLAY}}; z-index:5; pointer-events:none; }
</style>
</head>
<body>
  <div class="card">
    <img class="photo" src="{{PHOTO}}" alt="">
    <div class="grad"></div>
    <div class="texture"></div>
    <div class="dim"></div>
    <div class="wrap">
      <div class="lead">{{ТЕЗА}}</div>
      <div class="rule"></div>
      <div class="body">{{ТЕКСТ}}</div>
    </div>
    <div class="handle">{{HANDLE}}</div>
    <img class="cutout" src="{{CUTOUT}}" alt="">
  </div>
</body>
</html>
