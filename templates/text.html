<!DOCTYPE html>
<!-- ТЕКСТОВИЙ слайд · розмір за форматом · тло = колір АБО фото (колір тексту адаптивний) -->
<html lang="uk">
<head>
<meta charset="UTF-8">
{{FONT_LINKS}}
<style>
  :root{
    --font-display: {{FONT_DISPLAY}};
    --font-body: {{FONT_BODY}};
    --disp-weight: {{DISP_WEIGHT}}; --disp-style: {{DISP_STYLE}};
    --body-weight: {{BODY_WEIGHT}}; --body-style: {{BODY_STYLE}};
    --accent: {{ACCENT}};
    --ac-font: {{ACCENT_FONT}}; --ac-color: {{ACCENT_COLOR}};
    --ac-weight: {{ACCENT_WEIGHT}}; --ac-style: {{ACCENT_STYLE}};
    --card-bg: {{CARD_BG}};
    --ink: {{INK}};
    --body-ink: {{BODY_INK}};
    --meta: {{META_INK}};
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:{{W}}px; height:{{H}}px; }
  .card{ position:relative; width:{{W}}px; height:{{H}}px; overflow:hidden;
    background:var(--card-bg); font-family:var(--font-display);
    display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .photo{ position:absolute; top:50%; left:50%; width:{{PHOTO_DIM}}; height:{{PHOTO_DIM}}; object-fit:{{PHOTO_FIT}}; object-position:center;
    transform:translate(-50%,-50%) translate({{POS_X}}px,{{POS_Y}}px) scale({{SCALE}}) rotate({{ROTATE}}deg); transform-origin:center;
    display:{{PHOTO_DISPLAY}}; filter:saturate(0.98); z-index:0; }
  .grad{ position:absolute; inset:0; z-index:1; pointer-events:none; display:{{GRAD_DISPLAY}};
    background:linear-gradient(180deg, rgba(8,10,14,0.34) 0%, rgba(8,10,14,0.30) 45%, rgba(6,8,12,0.55) 100%); }
  .kicker{ position:absolute; top:78px; left:0; right:0; text-align:center; z-index:3;
    font-family:var(--font-body); font-weight:400; font-size:22px;
    letter-spacing:0.40em; text-transform:uppercase; color:var(--meta); display:{{KICKER_DISPLAY}}; }
  .wrap{ width:860px; text-align:{{TEXT_ALIGN}}; z-index:3;
    transform:translate({{TEXT_X}}px,{{TEXT_Y}}px);
    background:{{PLATE_BG}}; -webkit-backdrop-filter:{{PLATE_BLUR}}; backdrop-filter:{{PLATE_BLUR}}; padding:{{PLATE_PAD}}; }
  .lead{ font-weight:var(--disp-weight); font-style:var(--disp-style); font-size:96px; line-height:1.0; letter-spacing:0.01em;
    color:var(--ink); text-wrap:balance; }
  .rule{ width:70px; height:3px; background:var(--accent); margin:40px 0 38px; display:{{RULE_DISPLAY}}; }
  .body{ font-family:var(--font-body); font-weight:var(--body-weight); font-style:var(--body-style); font-size:46px;
    line-height:1.42; letter-spacing:0.004em; color:var(--body-ink); text-wrap:pretty; }
  .handle{ position:absolute; bottom:64px; left:0; right:0; text-align:center; z-index:3;
    font-family:var(--font-body); font-weight:400; font-size:23px;
    letter-spacing:0.34em; text-transform:lowercase; color:var(--meta); display:{{HANDLE_DISPLAY}}; }
  .texture{ position:absolute; inset:0; z-index:2; pointer-events:none; display:{{TEXTURE_DISPLAY}};
    background:{{TEXTURE}}; background-size:{{TEXTURE_SIZE}}; background-repeat:repeat;
    mix-blend-mode:{{TEXTURE_BLEND}}; opacity:{{TEXTURE_OP}}; }
  .dim{ position:absolute; inset:0; z-index:2; pointer-events:none; display:{{DIM_DISPLAY}}; background:#000; opacity:{{DIM}}; }
  .ac{ font-family:{{ACCENT_FONT}}; color:{{ACCENT_COLOR}};
    font-weight:{{ACCENT_WEIGHT}}; font-style:{{ACCENT_STYLE}}; }
  /* вирізаний об'єкт — верхній шар, над текстом */
  .cutout{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
    object-position:{{CUT_X}}% {{CUT_Y}}%; transform:scale({{CUT_SCALE}}) rotate({{CUT_ROTATE}}deg); transform-origin:center;
    display:{{CUTOUT_DISPLAY}}; z-index:5; pointer-events:none; }
</style>
</head>
<body>
  <div class="card">
    <img class="photo" src="{{PHOTO}}" alt="">
    <div class="grad"></div>
    <div class="texture"></div>
    <div class="dim"></div>
    <div class="kicker">{{KICKER}}</div>
    <div class="wrap">
      <div class="lead">{{ТЕЗА}}</div>
      <div class="rule"></div>
      <div class="body">{{ТЕКСТ}}</div>
    </div>
    <div class="handle">{{HANDLE}}</div>
    <img class="cutout" src="{{CUTOUT}}" alt="">
  </div>
</body>
</html>
